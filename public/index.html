<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .full-width { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
      background: #fff;
      color: #1a1a1a;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1a1a1a;
    }

    input.error { border-color: #e53e3e; }

    .error-msg {
      font-size: 0.75rem;
      color: #e53e3e;
      margin-top: 0.25rem;
      min-height: 1rem;
    }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      padding: 0.65rem 1.5rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-status {
      font-size: 0.85rem;
      color: #2d7a2d;
    }

    .submit-status.error { color: #e53e3e; }

    /* Filters */
    .filters {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .filters > div { flex: 1; min-width: 160px; }

    .btn-clear {
      padding: 0.6rem 1rem;
      background: transparent;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #555;
      transition: border-color 0.15s;
    }

    .btn-clear:hover { border-color: #999; }

    /* Total bar */
    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .expense-count { font-size: 0.85rem; color: #888; }

    .total-amount { font-size: 1.1rem; font-weight: 700; }

    /* Category summary chips */
    .category-summary {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .chip {
      background: #f0f0f0;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      font-size: 0.78rem;
    }

    .chip span { font-weight: 600; }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid #e0e0e0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #999;
      font-weight: 600;
    }

    tbody tr:hover { background: #fafafa; }

    tbody td {
      padding: 0.75rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #eef2ff;
      color: #3730a3;
    }

    .amount-cell {
      text-align: right;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #bbb;
      font-size: 0.95rem;
    }

    .loading { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>

<header>Expense Tracker</header>

<div class="container">

  <!-- Add Expense Form -->
  <div class="card">
    <h2>Add Expense</h2>
    <div class="form-grid">
      <div>
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" />
        <div class="error-msg" id="amountErr"></div>
      </div>
      <div>
        <label for="category">Category</label>
        <input type="text" id="category" placeholder="Food, Travel, Rent..." list="categoryList" />
        <datalist id="categoryList"></datalist>
        <div class="error-msg" id="categoryErr"></div>
      </div>
      <div class="full-width">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="What was this expense for?" />
        <div class="error-msg" id="descriptionErr"></div>
      </div>
      <div>
        <label for="date">Date</label>
        <input type="date" id="date" />
        <div class="error-msg" id="dateErr"></div>
      </div>
      <div class="full-width form-actions">
        <button type="submit" id="submitBtn" onclick="handleSubmit()">Add Expense</button>
        <div class="submit-status" id="submitStatus"></div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card">
    <h2>Filter and Sort</h2>
    <div class="filters">
      <div>
        <label for="filterCategory">Category</label>
        <select id="filterCategory" onchange="loadExpenses()">
          <option value="">All Categories</option>
        </select>
      </div>
      <div>
        <label for="filterSort">Sort by</label>
        <select id="filterSort" onchange="loadExpenses()">
          <option value="date_desc">Date (Newest First)</option>
        </select>
      </div>
      <button class="btn-clear" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <!-- Expense List -->
  <div class="card">
    <div class="total-bar">
      <span class="expense-count" id="expenseCount">0 expenses</span>
      <span class="total-amount" id="totalAmount">Total: ₹0.00</span>
    </div>
    <div class="category-summary" id="categorySummary"></div>
    <div id="tableContainer">
      <div class="empty-state">No expenses yet. Add one above.</div>
    </div>
  </div>

</div>

<script>
  const API = window.location.origin;

  // Observer pattern — every action that changes state calls loadExpenses()
  // The UI always reflects the latest server state

  // Idempotency key — generated once per form session
  // Reused on failure (safe retry), replaced on success (fresh key for next expense)
  let idempotencyKey = generateUUID();

  // Set today as the default date
  document.getElementById("date").value = new Date().toISOString().split("T")[0];

  // ── UUID generator ──────────────────────────────────────────────────────────

  function generateUUID() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
      const r = (Math.random() * 16) | 0;
      return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
    });
  }

  // ── Validation ──────────────────────────────────────────────────────────────

  function clearErrors() {
    ["amount", "category", "description", "date"].forEach((f) => {
      document.getElementById(f).classList.remove("error");
      document.getElementById(f + "Err").textContent = "";
    });
  }

  function validateForm() {
    clearErrors();
    let valid = true;

    const amount = parseFloat(document.getElementById("amount").value);
    if (!document.getElementById("amount").value || isNaN(amount) || amount <= 0) {
      document.getElementById("amount").classList.add("error");
      document.getElementById("amountErr").textContent = "Enter a valid positive amount";
      valid = false;
    }

    if (!document.getElementById("category").value.trim()) {
      document.getElementById("category").classList.add("error");
      document.getElementById("categoryErr").textContent = "Category is required";
      valid = false;
    }

    if (!document.getElementById("description").value.trim()) {
      document.getElementById("description").classList.add("error");
      document.getElementById("descriptionErr").textContent = "Description is required";
      valid = false;
    }

    if (!document.getElementById("date").value) {
      document.getElementById("date").classList.add("error");
      document.getElementById("dateErr").textContent = "Date is required";
      valid = false;
    }

    return valid;
  }

  // ── Submit handler ──────────────────────────────────────────────────────────

  async function handleSubmit() {
    if (!validateForm()) return;

    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("submitStatus");

    // Optimistic UI lock — disable button immediately to prevent double fire
    btn.disabled = true;
    btn.textContent = "Saving...";
    status.textContent = "";
    status.className = "submit-status";

    const payload = {
      amount: parseFloat(document.getElementById("amount").value),
      category: document.getElementById("category").value.trim(),
      description: document.getElementById("description").value.trim(),
      date: document.getElementById("date").value,
    };

    try {
      const res = await fetch(`${API}/expenses`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Idempotency-Key": idempotencyKey,
        },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Something went wrong");
      }

      // Success — reset form and generate a fresh idempotency key for the next expense
      status.textContent = "Expense saved";
      document.getElementById("amount").value = "";
      document.getElementById("description").value = "";
      document.getElementById("date").value = new Date().toISOString().split("T")[0];
      clearErrors();
      idempotencyKey = generateUUID();

      await loadExpenses();
      await loadCategories();

    } catch (err) {
      // Failure — show error but keep the same idempotency key so the retry is safe
      status.textContent = err.message;
      status.className = "submit-status error";
    } finally {
      btn.disabled = false;
      btn.textContent = "Add Expense";
    }
  }

  // ── Load expenses (Observer — called after every state change) ──────────────

  async function loadExpenses() {
    const category = document.getElementById("filterCategory").value;
    const sort = document.getElementById("filterSort").value;

    const params = new URLSearchParams();
    if (category) params.append("category", category);
    if (sort) params.append("sort", sort);

    const container = document.getElementById("tableContainer");
    container.classList.add("loading");

    try {
      const res = await fetch(`${API}/expenses?${params}`);
      if (!res.ok) throw new Error("Failed to load expenses");
      const expenses = await res.json();
      renderTable(expenses);
    } catch {
      container.innerHTML = `<div class="empty-state">Could not load expenses. Check your connection.</div>`;
    } finally {
      container.classList.remove("loading");
    }
  }

  // ── Render table ────────────────────────────────────────────────────────────

  function renderTable(expenses) {
    const count = expenses.length;

    // Total is computed client-side from the already-returned list — no extra API call
    const total = expenses.reduce((sum, e) => sum + e.amount, 0);

    document.getElementById("expenseCount").textContent =
      `${count} expense${count !== 1 ? "s" : ""}`;

    document.getElementById("totalAmount").textContent =
      `Total: ₹${total.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

    // Category breakdown chips
    const byCategory = {};
    expenses.forEach((e) => {
      byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
    });

    const summary = document.getElementById("categorySummary");
    if (Object.keys(byCategory).length > 1) {
      summary.innerHTML = Object.entries(byCategory)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, amt]) =>
          `<div class="chip">${escapeHtml(cat)}: <span>₹${amt.toLocaleString("en-IN", { minimumFractionDigits: 2 })}</span></div>`
        ).join("");
    } else {
      summary.innerHTML = "";
    }

    if (count === 0) {
      document.getElementById("tableContainer").innerHTML =
        `<div class="empty-state">No expenses match your filters.</div>`;
      return;
    }

    document.getElementById("tableContainer").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th style="text-align:right">Amount</th>
          </tr>
        </thead>
        <tbody>
          ${expenses.map((e) => `
            <tr>
              <td>${formatDate(e.date)}</td>
              <td><span class="badge">${escapeHtml(e.category)}</span></td>
              <td>${escapeHtml(e.description)}</td>
              <td class="amount-cell">₹${e.amount.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  // ── Load categories for filter dropdown ─────────────────────────────────────

  async function loadCategories() {
    try {
      const res = await fetch(`${API}/expenses/categories`);
      const cats = await res.json();

      const current = document.getElementById("filterCategory").value;
      document.getElementById("filterCategory").innerHTML =
        `<option value="">All Categories</option>` +
        cats.map((c) => `<option value="${escapeHtml(c)}" ${c === current ? "selected" : ""}>${escapeHtml(c)}</option>`).join("");

      document.getElementById("categoryList").innerHTML =
        cats.map((c) => `<option value="${escapeHtml(c)}">`).join("");
    } catch {
      // Non-critical — filter dropdown just won't populate
    }
  }

  // ── Utilities ───────────────────────────────────────────────────────────────

  function clearFilters() {
    document.getElementById("filterCategory").value = "";
    document.getElementById("filterSort").value = "date_desc";
    loadExpenses();
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split("-");
    return `${d}/${m}/${y}`;
  }

  // XSS protection — user input is always escaped before being inserted into the DOM
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Initialise ──────────────────────────────────────────────────────────────

  loadCategories().then(() => loadExpenses());
</script>

</body>
</html>
